version: "3.8"

services:
  stock-data-node:
    build: .
    container_name: stock-data-node
    restart: unless-stopped
    environment:
      - APP_BASE_DIR=/app
    volumes:
      # Config files (hot-reload supported)
      - ${DATA_PATH:-.}/config:/app/config
      # Parquet data (readable by dashboard and other services)
      - ${DATA_PATH:-.}/data:/app/data
      # Watch directory (drop .txt files here to trigger downloads)
      - ${DATA_PATH:-.}/watch:/app/watch
      # Log files (accessible from host for inspection)
      - ${DATA_PATH:-.}/logs:/app/logs
      # Persistent state (failed_ticker.json blacklist)
      - ${DATA_PATH:-.}/state:/app/state
    network_mode: "host"
    # Port mappings are ignored when using host networking
    # ports:
    #   - "8000:8002"
